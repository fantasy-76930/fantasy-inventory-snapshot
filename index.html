<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f8255" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="奇幻庫存快拍" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>奇幻庫存快拍系統</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css?v=21" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="cyber-scene" aria-hidden="true">
          <div class="forest-layer forest-back"></div>
          <div class="forest-layer forest-mid"></div>
          <div class="forest-layer forest-front"></div>
          <div class="butterfly-swarm">
            <svg class="butterfly butterfly-a" viewBox="0 0 160 160" role="presentation">

                  <stop offset="100%" stop-color="#0c593b" />
                </linearGradient>
                <radialGradient id="wingGlowA" cx="50%" cy="45%" r="58%">
                  <stop offset="0%" stop-color="#f7fff1" stop-opacity="0.78" />
                  <stop offset="52%" stop-color="#79ffd1" stop-opacity="0.24" />
                  <stop offset="100%" stop-color="#022817" stop-opacity="0.02" />

              </defs>

                <path class="wing-vein" d="M80 77C61 59 43 39 24 20M79 78C61 72 43 67 22 64M78 84C59 100 48 119 36 143M79 83C58 88 43 96 29 112" />
                <circle class="wing-dot" cx="40" cy="35" r="4" />

              </g>
              <g class="wing wing-right">
                <path class="wing-shell" d="M83 76C121 72 147 45 144 13C111 9 85 32 78 76Z" fill="url(#wingA)" />
                <path class="wing-glow" d="M84 72C115 68 135 45 135 22C109 24 90 41 82 72Z" fill="url(#wingGlowA)" />
                <path class="wing-shell" d="M84 83C122 88 141 113 127 145C101 139 83 114 78 84Z" fill="url(#wingA)" opacity="0.86" />
                <path class="wing-vein" d="M80 77C99 59 117 39 136 20M81 78C99 72 117 67 138 64M82 84C101 100 112 119 124 143M81 83C102 88 117 96 131 112" />
                <circle class="wing-dot" cx="120" cy="35" r="4" />

              </g>
              <path class="antenna" d="M76 48C66 34 56 31 47 28M84 48C94 34 104 31 113 28" />
              <ellipse class="body-core" cx="80" cy="78" rx="5.6" ry="39" />
              <ellipse class="body-light" cx="80" cy="62" rx="3" ry="13" />
            </svg>
            <svg class="butterfly butterfly-b" viewBox="0 0 160 160" role="presentation">
              <defs>
                <linearGradient id="wingB" x1="4%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="34%" stop-color="#91fff0" />
                  <stop offset="72%" stop-color="#4fc8ff" />
                  <stop offset="100%" stop-color="#07486a" />
                </linearGradient>
                <radialGradient id="wingGlowB" cx="50%" cy="38%" r="62%">
                  <stop offset="0%" stop-color="#f5fff8" stop-opacity="0.84" />
                  <stop offset="54%" stop-color="#78e7ff" stop-opacity="0.28" />
                  <stop offset="100%" stop-color="#052236" stop-opacity="0.04" />
                </radialGradient>
              </defs>
              <g class="wing wing-left">
                <path class="wing-shell" d="M78 73C45 62 27 34 41 9C68 16 83 42 83 74Z" fill="url(#wingB)" />
                <path class="wing-glow" d="M78 70C55 59 43 38 48 21C67 30 77 48 80 70Z" fill="url(#wingGlowB)" />
                <path class="wing-shell" d="M76 86C45 96 36 123 52 149C70 137 81 113 82 86Z" fill="url(#wingB)" opacity="0.82" />
                <path class="wing-vein" d="M80 75C66 54 56 33 43 12M80 76C63 69 49 61 36 48M79 87C65 106 58 126 52 148M79 86C63 92 50 103 40 118" />
                <path class="wing-mark" d="M53 34C59 39 63 45 64 53" />
                <circle class="wing-dot" cx="57" cy="116" r="3.6" />
              </g>
              <g class="wing wing-right">
                <path class="wing-shell" d="M82 73C115 62 133 34 119 9C92 16 77 42 77 74Z" fill="url(#wingB)" />
                <path class="wing-glow" d="M82 70C105 59 117 38 112 21C93 30 83 48 80 70Z" fill="url(#wingGlowB)" />
                <path class="wing-shell" d="M84 86C115 96 124 123 108 149C90 137 79 113 78 86Z" fill="url(#wingB)" opacity="0.82" />
                <path class="wing-vein" d="M80 75C94 54 104 33 117 12M80 76C97 69 111 61 124 48M81 87C95 106 102 126 108 148M81 86C97 92 110 103 120 118" />
                <path class="wing-mark" d="M107 34C101 39 97 45 96 53" />
                <circle class="wing-dot" cx="103" cy="116" r="3.6" />
              </g>
              <path class="antenna" d="M76 50C66 37 58 33 49 31M84 50C94 37 102 33 111 31" />
              <ellipse class="body-core" cx="80" cy="80" rx="5" ry="35" />
              <ellipse class="body-light" cx="80" cy="66" rx="2.6" ry="12" />
            </svg>
            <svg class="butterfly butterfly-c" viewBox="0 0 160 160" role="presentation">
              <defs>
                <linearGradient id="wingC" x1="8%" y1="0%" x2="94%" y2="98%">
                  <stop offset="0%" stop-color="#fff7a8" />
                  <stop offset="32%" stop-color="#c6ff85" />
                  <stop offset="66%" stop-color="#5effc5" />
                  <stop offset="100%" stop-color="#0f6f49" />
                </linearGradient>
                <radialGradient id="wingGlowC" cx="50%" cy="46%" r="60%">
                  <stop offset="0%" stop-color="#fffde0" stop-opacity="0.76" />
                  <stop offset="52%" stop-color="#9dffba" stop-opacity="0.28" />
                  <stop offset="100%" stop-color="#0d2c1d" stop-opacity="0.04" />
                </radialGradient>
              </defs>
              <g class="wing wing-left">
                <path class="wing-shell" d="M77 76C43 71 20 52 22 20C52 17 75 36 83 76Z" fill="url(#wingC)" />
                <path class="wing-glow" d="M76 72C50 67 33 51 33 29C55 30 71 45 79 72Z" fill="url(#wingGlowC)" />
                <path class="wing-shell" d="M76 83C42 92 28 117 42 146C64 139 78 113 82 83Z" fill="url(#wingC)" opacity="0.84" />
                <path class="wing-vein" d="M80 77C61 60 46 42 25 22M79 78C61 75 45 72 26 69M78 84C60 101 51 122 43 144M79 84C61 90 48 100 35 113" />
                <circle class="wing-dot gold" cx="44" cy="42" r="4.2" />
                <circle class="wing-dot gold" cx="54" cy="116" r="3.2" />
              </g>
              <g class="wing wing-right">
                <path class="wing-shell" d="M83 76C117 71 140 52 138 20C108 17 85 36 77 76Z" fill="url(#wingC)" />
                <path class="wing-glow" d="M84 72C110 67 127 51 127 29C105 30 89 45 81 72Z" fill="url(#wingGlowC)" />
                <path class="wing-shell" d="M84 83C118 92 132 117 118 146C96 139 82 113 78 83Z" fill="url(#wingC)" opacity="0.84" />
                <path class="wing-vein" d="M80 77C99 60 114 42 135 22M81 78C99 75 115 72 134 69M82 84C100 101 109 122 117 144M81 84C99 90 112 100 125 113" />
                <circle class="wing-dot gold" cx="116" cy="42" r="4.2" />
                <circle class="wing-dot gold" cx="106" cy="116" r="3.2" />
              </g>
              <path class="antenna" d="M76 49C67 36 57 31 48 29M84 49C93 36 103 31 112 29" />
              <ellipse class="body-core" cx="80" cy="79" rx="5.4" ry="37" />
              <ellipse class="body-light" cx="80" cy="64" rx="2.8" ry="12" />
            </svg>
          </div>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">PWA 盤點工具</p>
          <h1>奇幻庫存快拍系統</h1>
          <p class="hero-note">拍照盤點、成本換算、每月紀錄，整理成一個真正順手的手機工具。</p>
          <div class="hero-pills">
            <span>拍照上傳</span>
            <span>AI 辨識</span>
            <span>成本換算</span>
            <span>歷史變化</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="total-box">
            <span>總庫存金額</span>
            <strong id="grandTotal">$0</strong>
          </div>
          <button class="secondary-button logout-button" id="logoutBtn" type="button">登出</button>
        </div>
      </header>

      <main class="workspace">
        <section class="capture-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">快拍辨識</p>
              <h2>拍照上傳</h2>
            </div>
            <button class="ghost-button" id="newSnapshotBtn" type="button">新增此次盤點紀錄</button>
          </div>

          <label class="upload-drop" for="photoInput">
            <input id="photoInput" type="file" accept="image/*" capture="environment" />
            <span class="camera-icon">▣</span>
            <strong>拍照或選擇庫存照片</strong>
            <small>上傳後可按 AI 辨識，再手動修正數量與分類。</small>
          </label>

          <div class="photo-preview" id="photoPreview">
            <span>尚未上傳照片</span>
          </div>

          <div class="actions-row">
            <button id="aiDetectBtn" type="button">AI 辨識庫存</button>
            <button class="secondary-button" id="addBlankBtn" type="button">手動新增品項</button>
            <button class="secondary-button" id="resetCurrentBtn" type="button">清空本次盤點</button>
          </div>

          <div class="hint-box">
            <strong>AI 狀態</strong>
            <p id="aiStatus">目前為離線示範辨識。之後可接 OpenAI Vision 或公司內部 API，把照片轉成盤點品項。</p>
          </div>
        </section>

        <section class="inventory-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">盤點清單</p>
              <h2>手動修正數量</h2>
            </div>
            <div class="compact-stat">
              <span>本次筆數</span>
              <strong id="itemCount">0</strong>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>分類</th>
                  <th>品項</th>
                  <th>計算</th>
                  <th>數量</th>
                  <th>盤點單位</th>
                  <th>寬度 cm</th>
                  <th>長度 cm</th>
                  <th>換算</th>
                  <th>成本單位</th>
                  <th>單位成本</th>
                  <th>小計</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="inventoryBody"></tbody>
            </table>
          </div>
        </section>

        <section class="cost-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">常用品項成本表</p>
              <h2>成本資料</h2>
            </div>
            <span class="cost-count" id="costCount"></span>
            <button class="secondary-button" id="addCostBtn" type="button">新增成本</button>
          </div>

          <div class="table-wrap small-table">
            <table>
              <thead>
                <tr>
                  <th>分類</th>
                  <th>品項</th>
                  <th>盤點單位</th>
                  <th>換算</th>
                  <th>成本單位</th>
                  <th>單位成本</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="costBody"></tbody>
            </table>
          </div>
        </section>

        <section class="history-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">每月盤點紀錄</p>
              <h2>歷史變化</h2>
            </div>
            <div class="actions-row tight">
              <button class="secondary-button" id="exportExcelBtn" type="button">匯出 Excel</button>
              <button class="secondary-button" id="exportPdfBtn" type="button">匯出 PDF</button>
            </div>
          </div>

          <div class="history-grid" id="historyGrid"></div>
        </section>
      </main>
    </div>

    <template id="inventoryRowTemplate">
      <tr>
        <td><select class="category-input"></select></td>
        <td><input class="name-input" type="text" placeholder="品項名稱" /></td>
        <td>
          <select class="calc-mode-input">
            <option value="count">一般</option>
            <option value="area">才數</option>
          </select>
        </td>
        <td><input class="qty-input" type="number" min="0" step="1" /></td>
        <td><input class="unit-input" type="text" placeholder="單位" /></td>
        <td><input class="width-input" type="number" min="0" step="0.1" placeholder="120" /></td>
        <td><input class="length-input" type="number" min="0" step="0.1" placeholder="5000" /></td>
        <td><input class="conversion-input" type="number" min="0" step="1" /></td>
        <td><input class="cost-unit-input" type="text" placeholder="成本單位" /></td>
        <td><input class="cost-input" type="number" min="0" step="1" /></td>
        <td class="subtotal-cell">$0</td>
        <td><button class="icon-button delete-row" type="button" title="刪除">×</button></td>
      </tr>
    </template>

    <template id="costRowTemplate">
      <tr>
        <td><select class="cost-category-input"></select></td>
        <td><input class="cost-name-input" type="text" placeholder="品項名稱" /></td>
        <td><input class="cost-unit-input" type="text" placeholder="箱" /></td>
        <td><input class="cost-conversion-input" type="number" min="0" step="1" /></td>
        <td><input class="cost-base-unit-input" type="text" placeholder="盒" /></td>
        <td><input class="cost-value-input" type="number" min="0" step="1" /></td>
        <td><button class="icon-button delete-cost" type="button" title="刪除">×</button></td>
      </tr>
    </template>

    <script src="app.js?v=21"></script>
  </body>
</html>
