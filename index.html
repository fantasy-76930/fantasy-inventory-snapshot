<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f8255" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="奇幻庫存快拍" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>奇幻庫存快拍系統</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css?v=30" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="cyber-scene" aria-hidden="true">
          <div class="forest-layer forest-back"></div>
          <div class="forest-layer forest-mid"></div>
          <div class="forest-layer forest-front"></div>
          <div class="butterfly-swarm">
            <img class="butterfly poster-butterfly poster-butterfly-a butterfly-a" src="assets/poster-butterfly-a.png" alt="" aria-hidden="true" />
            <img class="butterfly poster-butterfly poster-butterfly-b butterfly-b" src="assets/poster-butterfly-b.png" alt="" aria-hidden="true" />
            <img class="butterfly poster-butterfly poster-butterfly-c butterfly-c" src="assets/poster-butterfly-c.png" alt="" aria-hidden="true" />
            <span class="butterfly emoji-butterfly butterfly-a" aria-hidden="true">&#x1F98B;</span>
            <span class="butterfly emoji-butterfly butterfly-b" aria-hidden="true">&#x1F98B;</span>
            <span class="butterfly emoji-butterfly butterfly-c" aria-hidden="true">&#x1F98B;</span>
            <svg class="butterfly butterfly-a" viewBox="0 0 160 160" role="presentation">
              <defs>
                <linearGradient id="wingA" x1="12%" y1="4%" x2="92%" y2="96%">
                  <stop offset="0%" stop-color="#efffae" />
                  <stop offset="38%" stop-color="#92ffd2" />
                  <stop offset="72%" stop-color="#22d889" />
                  <stop offset="100%" stop-color="#0c593b" />
                </linearGradient>
                <radialGradient id="wingGlowA" cx="50%" cy="45%" r="58%">
                  <stop offset="0%" stop-color="#f7fff1" stop-opacity="0.78" />
                  <stop offset="52%" stop-color="#79ffd1" stop-opacity="0.24" />
                  <stop offset="100%" stop-color="#022817" stop-opacity="0.02" />
                </radialGradient>
              </defs>
              <g class="wing wing-left">
                <path class="wing-shell" d="M76 76C53 58 25 49 18 22C45 5 76 24 83 74Z" fill="url(#wingA)" />
                <path class="wing-glow" d="M75 70C57 55 38 45 30 27C52 23 72 38 79 70Z" fill="url(#wingGlowA)" />
                <path class="wing-shell" d="M76 84C51 82 33 98 36 125C59 130 77 112 82 86Z" fill="url(#wingA)" opacity="0.88" />
                <path class="wing-vein" d="M80 77C63 58 47 42 28 22M79 78C61 73 45 69 27 66M78 84C62 98 52 112 40 125M79 84C61 89 48 96 38 108" />
                <circle class="wing-dot" cx="40" cy="35" r="4" />
                <circle class="wing-dot" cx="52" cy="102" r="3.4" />
              </g>
              <g class="wing wing-right">
                <path class="wing-shell" d="M84 76C107 58 135 49 142 22C115 5 84 24 77 74Z" fill="url(#wingA)" />
                <path class="wing-glow" d="M85 70C103 55 122 45 130 27C108 23 88 38 81 70Z" fill="url(#wingGlowA)" />
                <path class="wing-shell" d="M84 84C109 82 127 98 124 125C101 130 83 112 78 86Z" fill="url(#wingA)" opacity="0.88" />
                <path class="wing-vein" d="M80 77C97 58 113 42 132 22M81 78C99 73 115 69 133 66M82 84C98 98 108 112 120 125M81 84C99 89 112 96 122 108" />
                <circle class="wing-dot" cx="120" cy="35" r="4" />
                <circle class="wing-dot" cx="108" cy="102" r="3.4" />
              </g>
              <path class="antenna" d="M75 57C64 45 55 42 45 42M85 57C96 45 105 42 115 42" />
              <path class="body-core" d="M80 59C89 59 93 67 90 76C87 84 88 94 92 104C86 113 74 113 68 104C72 94 73 84 70 76C67 67 71 59 80 59Z" />
              <ellipse class="body-light" cx="80" cy="70" rx="3" ry="8" />
            </svg>
            <svg class="butterfly butterfly-b" viewBox="0 0 160 160" role="presentation">
              <defs>
                <linearGradient id="wingB" x1="4%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="34%" stop-color="#91fff0" />
                  <stop offset="72%" stop-color="#4fc8ff" />
                  <stop offset="100%" stop-color="#07486a" />
                </linearGradient>
                <radialGradient id="wingGlowB" cx="50%" cy="38%" r="62%">
                  <stop offset="0%" stop-color="#f5fff8" stop-opacity="0.84" />
                  <stop offset="54%" stop-color="#78e7ff" stop-opacity="0.28" />
                  <stop offset="100%" stop-color="#052236" stop-opacity="0.04" />
                </radialGradient>
              </defs>
              <g class="wing wing-left">
                <path class="wing-shell" d="M77 75C51 61 31 45 35 17C61 11 82 35 84 75Z" fill="url(#wingB)" />
                <path class="wing-glow" d="M77 70C58 58 47 42 46 25C64 27 77 46 81 70Z" fill="url(#wingGlowB)" />
                <path class="wing-shell" d="M76 86C51 92 39 111 51 133C69 127 80 109 82 87Z" fill="url(#wingB)" opacity="0.84" />
                <path class="wing-vein" d="M80 75C66 56 56 38 40 20M80 76C64 70 50 64 38 53M79 87C66 101 58 117 52 132M79 86C64 91 52 100 43 113" />
                <path class="wing-mark" d="M52 35C58 39 63 45 64 52" />
                <circle class="wing-dot" cx="57" cy="116" r="3.6" />
              </g>
              <g class="wing wing-right">
                <path class="wing-shell" d="M83 75C109 61 129 45 125 17C99 11 78 35 76 75Z" fill="url(#wingB)" />
                <path class="wing-glow" d="M83 70C102 58 113 42 114 25C96 27 83 46 79 70Z" fill="url(#wingGlowB)" />
                <path class="wing-shell" d="M84 86C109 92 121 111 109 133C91 127 80 109 78 87Z" fill="url(#wingB)" opacity="0.84" />
                <path class="wing-vein" d="M80 75C94 56 104 38 120 20M80 76C96 70 110 64 122 53M81 87C94 101 102 117 108 132M81 86C96 91 108 100 117 113" />
                <path class="wing-mark" d="M108 35C102 39 97 45 96 52" />
                <circle class="wing-dot" cx="103" cy="116" r="3.6" />
              </g>
              <path class="antenna" d="M75 58C65 47 56 44 47 43M85 58C95 47 104 44 113 43" />
              <path class="body-core" d="M80 60C88 60 92 68 89 76C87 84 88 94 92 103C86 111 74 111 68 103C72 94 73 84 71 76C68 68 72 60 80 60Z" />
              <ellipse class="body-light" cx="80" cy="71" rx="2.8" ry="7.6" />
            </svg>
            <svg class="butterfly butterfly-c" viewBox="0 0 160 160" role="presentation">
              <defs>
                <linearGradient id="wingC" x1="8%" y1="0%" x2="94%" y2="98%">
                  <stop offset="0%" stop-color="#fff7a8" />
                  <stop offset="32%" stop-color="#c6ff85" />
                  <stop offset="66%" stop-color="#5effc5" />
                  <stop offset="100%" stop-color="#0f6f49" />
                </linearGradient>
                <radialGradient id="wingGlowC" cx="50%" cy="46%" r="60%">
                  <stop offset="0%" stop-color="#fffde0" stop-opacity="0.76" />
                  <stop offset="52%" stop-color="#9dffba" stop-opacity="0.28" />
                  <stop offset="100%" stop-color="#0d2c1d" stop-opacity="0.04" />
                </radialGradient>
              </defs>
              <g class="wing wing-left">
                <path class="wing-shell" d="M76 76C51 60 26 51 24 23C51 12 76 31 83 75Z" fill="url(#wingC)" />
                <path class="wing-glow" d="M76 71C55 58 39 49 34 30C55 29 72 43 79 71Z" fill="url(#wingGlowC)" />
                <path class="wing-shell" d="M76 84C52 86 35 103 42 128C63 130 78 111 82 85Z" fill="url(#wingC)" opacity="0.86" />
                <path class="wing-vein" d="M80 77C62 60 47 44 28 25M79 78C62 74 46 71 28 69M78 84C61 98 52 113 44 127M79 84C62 90 49 99 38 112" />
                <circle class="wing-dot gold" cx="44" cy="42" r="4.2" />
                <circle class="wing-dot gold" cx="54" cy="116" r="3.2" />
              </g>
              <g class="wing wing-right">
                <path class="wing-shell" d="M84 76C109 60 134 51 136 23C109 12 84 31 77 75Z" fill="url(#wingC)" />
                <path class="wing-glow" d="M84 71C105 58 121 49 126 30C105 29 88 43 81 71Z" fill="url(#wingGlowC)" />
                <path class="wing-shell" d="M84 84C108 86 125 103 118 128C97 130 82 111 78 85Z" fill="url(#wingC)" opacity="0.86" />
                <path class="wing-vein" d="M80 77C98 60 113 44 132 25M81 78C98 74 114 71 132 69M82 84C99 98 108 113 116 127M81 84C98 90 111 99 122 112" />
                <circle class="wing-dot gold" cx="116" cy="42" r="4.2" />
                <circle class="wing-dot gold" cx="106" cy="116" r="3.2" />
              </g>
              <path class="antenna" d="M75 58C65 46 56 43 46 42M85 58C95 46 104 43 114 42" />
              <path class="body-core" d="M80 60C89 60 93 68 90 76C87 84 88 94 92 104C86 112 74 112 68 104C72 94 73 84 70 76C67 68 71 60 80 60Z" />
              <ellipse class="body-light" cx="80" cy="71" rx="2.9" ry="8" />
            </svg>
          </div>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">PWA 盤點工具</p>
          <h1>奇幻庫存快拍系統</h1>
          <p class="hero-note">拍照盤點、成本換算、每月紀錄，整理成一個真正順手的手機工具。</p>
          <div class="hero-pills" aria-label="快速操作">
            <button id="quickCaptureBtn" type="button">拍照上傳</button>
            <button id="quickAiBtn" type="button">AI 辨識</button>
            <button id="quickCostBtn" type="button">成本換算</button>
            <button id="quickHistoryBtn" type="button">歷史變化</button>
          </div>
        </div>
        <div class="hero-side">
          <div class="total-box">
            <span>總庫存金額</span>
            <strong id="grandTotal">$0</strong>
          </div>
          <button class="secondary-button logout-button" id="logoutBtn" type="button">登出</button>
        </div>
      </header>

      <main class="workspace">
        <section class="capture-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">快拍辨識</p>
              <h2>拍照上傳</h2>
            </div>
            <button class="ghost-button" id="newSnapshotBtn" type="button">新增此次盤點紀錄</button>
          </div>

          <label class="upload-drop" for="photoInput">
            <input id="photoInput" type="file" accept="image/*" capture="environment" />
            <span class="camera-icon">▣</span>
            <strong>拍照或選擇庫存照片</strong>
            <small>上傳後可按 AI 辨識，再手動修正數量與分類。</small>
          </label>

          <div class="photo-preview" id="photoPreview">
            <span>尚未上傳照片</span>
          </div>

          <div class="actions-row">
            <button id="aiDetectBtn" type="button">AI 辨識庫存</button>
            <button class="secondary-button" id="addBlankBtn" type="button">手動新增品項</button>
            <button class="secondary-button" id="resetCurrentBtn" type="button">清空本次盤點</button>
          </div>

          <div class="hint-box">
            <strong>AI 狀態</strong>
            <p id="aiStatus">目前為離線示範辨識。之後可接 OpenAI Vision 或公司內部 API，把照片轉成盤點品項。</p>
          </div>
        </section>

        <section class="inventory-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">盤點清單</p>
              <h2>手動修正數量</h2>
            </div>
            <div class="compact-stat">
              <span>本次筆數</span>
              <strong id="itemCount">0</strong>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>分類</th>
                  <th>品項</th>
                  <th>計算</th>
                  <th>數量</th>
                  <th>盤點單位</th>
                  <th>寬度 cm</th>
                  <th>長度 cm</th>
                  <th>換算</th>
                  <th>成本單位</th>
                  <th>單位成本</th>
                  <th>小計</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="inventoryBody"></tbody>
            </table>
          </div>
        </section>

        <section class="cost-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">常用品項成本表</p>
              <h2>成本資料</h2>
            </div>
            <span class="cost-count" id="costCount"></span>
            <button class="secondary-button" id="addCostBtn" type="button">新增成本</button>
          </div>

          <div class="table-wrap small-table">
            <table>
              <thead>
                <tr>
                  <th>分類</th>
                  <th>品項</th>
                  <th>盤點單位</th>
                  <th>換算</th>
                  <th>成本單位</th>
                  <th>單位成本</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="costBody"></tbody>
            </table>
          </div>
        </section>

        <section class="history-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">每月盤點紀錄</p>
              <h2>歷史變化</h2>
            </div>
            <div class="actions-row tight">
              <button class="secondary-button" id="exportExcelBtn" type="button">匯出 Excel</button>
              <button class="secondary-button" id="exportPdfBtn" type="button">匯出 PDF</button>
            </div>
          </div>

          <div class="history-grid" id="historyGrid"></div>
        </section>
      </main>
    </div>

    <template id="inventoryRowTemplate">
      <tr>
        <td><select class="category-input"></select></td>
        <td><input class="name-input" type="text" placeholder="品項名稱" /></td>
        <td>
          <select class="calc-mode-input">
            <option value="count">一般</option>
            <option value="area">才數</option>
          </select>
        </td>
        <td><input class="qty-input" type="number" min="0" step="1" /></td>
        <td><input class="unit-input" type="text" placeholder="單位" /></td>
        <td><input class="width-input" type="number" min="0" step="0.1" placeholder="120" /></td>
        <td><input class="length-input" type="number" min="0" step="0.1" placeholder="5000" /></td>
        <td><input class="conversion-input" type="number" min="0" step="1" /></td>
        <td><input class="cost-unit-input" type="text" placeholder="成本單位" /></td>
        <td><input class="cost-input" type="number" min="0" step="1" /></td>
        <td class="subtotal-cell">$0</td>
        <td><button class="icon-button delete-row" type="button" title="刪除">×</button></td>
      </tr>
    </template>

    <template id="costRowTemplate">
      <tr>
        <td><select class="cost-category-input"></select></td>
        <td><input class="cost-name-input" type="text" placeholder="品項名稱" /></td>
        <td><input class="cost-unit-input" type="text" placeholder="箱" /></td>
        <td><input class="cost-conversion-input" type="number" min="0" step="1" /></td>
        <td><input class="cost-base-unit-input" type="text" placeholder="盒" /></td>
        <td><input class="cost-value-input" type="number" min="0" step="1" /></td>
        <td><button class="icon-button delete-cost" type="button" title="刪除">×</button></td>
      </tr>
    </template>

    <script src="app.js?v=30"></script>
  </body>
</html>
