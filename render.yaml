services:
  - type: web
    name: fantasy-inventory-snapshot
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
